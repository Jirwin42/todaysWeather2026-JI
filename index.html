<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/cosmo/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>Today's Weather</title>
</head>
<body>
    <div class="container py-4">
        <h2 class="text-center text-primary fw-bold mb-4">Current Weather</h2>
        
        <button class="btn btn-primary btn-lg col-12 shadow-sm mb-4" id="btnCalculate" type="button">Calculate Current Weather</button>
        
        <template id="tmplWeatherCard">
            <div class="col d-flex h-100">
                <div class="card border-0 shadow-sm rounded-3 w-100 overflow-hidden">
                    <div class="character-link text-wrap d-flex flex-column h-100"></div>
                </div>
            </div>
        </template>
        
        <div id="weatherCardsContainer"></div>
        
        <h5 class="text-center text-muted mt-5 fs-6">Data provided by OpenMeteo: https://open-meteo.com/</h5>
    </div>

<script>
const strBaseURL = 'https://api.open-meteo.com/v1/forecast?latitude=36.16&longitude=-85.5&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max&hourly=temperature_2m,relative_humidity_2m,weather_code,apparent_temperature,precipitation_probability,wind_speed_10m&current=temperature_2m,relative_humidity_2m,apparent_temperature,is_day,wind_speed_10m,wind_direction_10m,precipitation,weather_code&timezone=America%2FChicago&wind_speed_unit=mph&temperature_unit=fahrenheit&precipitation_unit=inch';

document.querySelector('#btnCalculate').addEventListener('click', getWeather);

function getWeather() {
    fetch(strBaseURL)
        .then(response => response.json())
        .then(data => {
            const container = document.querySelector('#weatherCardsContainer');
            container.innerHTML = ''; // clear previous results if needed
            const template = document.querySelector('#tmplWeatherCard');

            // Today results
            const currentCardCol = template.content.cloneNode(true);
            const currentCard = currentCardCol.querySelector('.card');

            // !AI Updated injected HTML to use Bootstrap card-header/card-body structure. Increased font sizes (fs-5) and colored the icons for better visual hierarchy.
            currentCard.querySelector('.character-link').innerHTML = `
                <div class="card-header bg-primary text-white">
                    <h4 class="text-center mb-0 fw-bold">Today's Weather</h4>
                </div>
                <div class="card-body p-4">
                    <div class="row text-wrap fs-5">
                        <div class="col-md-4 mb-2"> <i class="bi bi-thermometer-half text-danger"></i> <strong>Temperature:</strong> ${data.current.temperature_2m}°F</div>
                        <div class="col-md-4 mb-2"> <i class="bi bi-person-fill text-info"></i> <strong>Feels Like:</strong> ${data.current.apparent_temperature}°F</div>
                        <div class="col-md-4 mb-2"> <i class="bi bi-droplet-fill text-primary"></i> <strong>Humidity:</strong> ${data.current.relative_humidity_2m}%</div>
                        <div class="col-md-4 mb-2"> <i class="bi bi-wind text-secondary"></i> <strong>Wind:</strong> ${data.current.wind_speed_10m} mph (${data.current.wind_direction_10m}°)</div>
                        <div class="col-md-4 mb-2"> <i class="bi bi-cloud-rain-fill text-info"></i> <strong>Precipitation:</strong> ${data.current.precipitation} in</div>
                        <div class="col-md-4 mb-2"> <i class="bi bi-cloud-sun text-warning"></i> <strong>Weather Code:</strong> ${data.current.weather_code}</div>
                    </div>
                </div>
            `;

            // Center the results
            const todayRow = document.createElement('div');
            todayRow.className = 'row justify-content-center mb-4';
            const todayCol = document.createElement('div');
            todayCol.className = 'col-12 col-md-10 mx-auto'; // !AI Removed col-lg-8 to allow the card to be slightly wider and more readable
            todayCol.appendChild(currentCardCol);
            todayRow.appendChild(todayCol);
            container.appendChild(todayRow);

            // Divider
            const divider = document.createElement('hr');
            // !AI Changed divider color to better match the Cosmo theme's softer grays
            divider.className = 'my-4 text-muted';
            container.appendChild(divider);

            // Week ahead
            const weekRow = document.createElement('div');
            // !AI Kept gutter spacing (g-3) but ensured cards stretch evenly
            weekRow.className = 'row g-3 justify-content-center align-items-stretch';

            const days = data.daily.time.map((date, index) => ({
                date,
                tempMin: data.daily.temperature_2m_min[index],
                tempMax: data.daily.temperature_2m_max[index],
                weatherCode: data.daily.weather_code[index],
                precipitationSum: data.daily.precipitation_sum[index],
                precipitationProb: data.daily.precipitation_probability_max[index]
            }));

            days.forEach(day => {
                const dayCardCol = template.content.cloneNode(true);
                const dayCard = dayCardCol.querySelector('.card');

                // !AI Structured the daily forecast with a dark card header, formatted body text, and colored icons
                dayCard.querySelector('.character-link').innerHTML = `
                    <div class="card-header bg-dark text-white p-2">
                        <h6 class="text-center mb-0">${day.date}</h6>
                    </div>
                    <div class="card-body p-3 d-flex flex-column justify-content-center">
                        <p class="mb-2 text-wrap small"> <i class="bi bi-moon-stars-fill text-secondary"></i> <strong>Min:</strong> ${day.tempMin}°F</p>
                        <p class="mb-2 text-wrap small"> <i class="bi bi-brightness-high-fill text-warning"></i> <strong>Max:</strong> ${day.tempMax}°F</p>
                        <p class="mb-2 text-wrap small"> <i class="bi bi-droplet text-primary"></i> <strong>Rain Sum:</strong> ${day.precipitationSum} in</p>
                        <p class="mb-2 text-wrap small"> <i class="bi bi-umbrella-fill text-info"></i> <strong>Rain Prob:</strong> ${day.precipitationProb}%</p>
                        <p class="mb-0 text-wrap small"> <i class="bi bi-cloud text-secondary"></i> <strong>Code:</strong> ${day.weatherCode}</p>
                    </div>
                `;

                const col = document.createElement('div');
                // !AI Removed conflicting w-25 hardcoded width to let standard Bootstrap responsive column classes (col-lg) format the grid automatically
                col.className = 'col-12 col-sm-6 col-md-4 col-lg mb-3'; 
                col.appendChild(dayCardCol);
                weekRow.appendChild(col);
            });

            container.appendChild(weekRow);
        })
        .catch(error => console.error('Error fetching weather data:', error));
}
</script>
</body>
</html>
