<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>Today's Weather</title>
</head>
<body>
    <h2 class="text-center">Current Weather</h2>
    <button class="btn btn-primary col-12 mt-2" id="btnCalculate" type="button">Calculate Current Weather</button>
    <template id="tmplWeatherCard">
        <div class="col d-flex">
            <div class="card border-danger border-2 shadow-sm rounded-3 w-100">
                <div class="card-body p-3">
                    <div class="character-link text-wrap"></div>
                </div>
            </div>
        </div>
    </template>
    <div id="weatherCardsContainer"></div>
    <h5 class="text-center">Data provided by OpenMeteo: https://open-meteo.com/</h5>
<script>
const strBaseURL = 'https://api.open-meteo.com/v1/forecast?latitude=36.16&longitude=-85.5&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max&hourly=temperature_2m,relative_humidity_2m,weather_code,apparent_temperature,precipitation_probability,wind_speed_10m&current=temperature_2m,relative_humidity_2m,apparent_temperature,is_day,wind_speed_10m,wind_direction_10m,precipitation,weather_code&timezone=America%2FChicago&wind_speed_unit=mph&temperature_unit=fahrenheit&precipitation_unit=inch';

document.querySelector('#btnCalculate').addEventListener('click', getWeather);

function getWeather() {
    fetch(strBaseURL)
        .then(response => response.json())
        .then(data => {
            const container = document.querySelector('#weatherCardsContainer');
            container.innerHTML = ''; // clear previous results if needed
            const template = document.querySelector('#tmplWeatherCard');

            // Today results
            const currentCardCol = template.content.cloneNode(true);
            const currentCard = currentCardCol.querySelector('.card');

            //add new bits of html to the site after button is pushed
            currentCard.querySelector('.character-link').innerHTML = `
                <h4 class="text-center mb-3">Today's Weather</h4>
                <div class="row text-wrap">
                    <div class="col-md-4 mb-1"> <i class="bi bi-thermometer"></i> <strong>Temperature:</strong> ${data.current.temperature_2m}°F</div>
                    <div class="col-md-4 mb-1"> <i class="bi bi-cloud-fill"></i> <strong>Feels Like:</strong> ${data.current.apparent_temperature}°F</div>
                    <div class="col-md-4 mb-1"> <i class="bi bi-moisture"></i> <strong>Humidity:</strong> ${data.current.relative_humidity_2m}%</div>
                    <div class="col-md-4 mb-1"> <i class="bi bi-wind"></i> <strong>Wind:</strong> ${data.current.wind_speed_10m} mph (${data.current.wind_direction_10m}°)</div>
                    <div class="col-md-4 mb-1"> <i class="bi bi-cloud-rain-fill"></i> <strong>Precipitation:</strong> ${data.current.precipitation} in</div>
                    <div class="col-md-4 mb-1"><strong>Weather Code:</strong> ${data.current.weather_code}</div>
                </div>
            `;

            // Center the results
            const todayRow = document.createElement('div');
            todayRow.className = 'row justify-content-center mb-4';
            const todayCol = document.createElement('div');
            todayCol.className = 'col-12 col-md-10 col-lg-8 mx-auto';
            todayCol.appendChild(currentCardCol);
            todayRow.appendChild(todayCol);
            container.appendChild(todayRow);

            // Divider
            const divider = document.createElement('hr');
            divider.className = 'my-4 border border-2 border-secondary';
            container.appendChild(divider);

            // Week ahead
            const weekRow = document.createElement('div');
            weekRow.className = 'row g-3 justify-content-center';

            const days = data.daily.time.map((date, index) => ({
                date,
                tempMin: data.daily.temperature_2m_min[index],
                tempMax: data.daily.temperature_2m_max[index],
                weatherCode: data.daily.weather_code[index],
                precipitationSum: data.daily.precipitation_sum[index],
                precipitationProb: data.daily.precipitation_probability_max[index]
            }));

            days.forEach(day => {
                const dayCardCol = template.content.cloneNode(true);
                const dayCard = dayCardCol.querySelector('.card');

                dayCard.querySelector('.character-link').innerHTML = `
                    <h6 class="text-center mb-2">${day.date}</h6>
                    <p class="mb-2 text-wrap"> <i class="bi bi-moon-fill"></i> <strong>Min:</strong> ${day.tempMin}°F</p>
                    <p class="mb-2 text-wrap"> <i class="bi bi-brightness-high-fill"></i> <strong>Max:</strong> ${day.tempMax}°F</p>
                    <p class="mb-2 text-wrap"> <i class="bi bi-moisture"></i> <strong>Rain Sum:</strong> ${day.precipitationSum} in</p>
                    <p class="mb-2 text-wrap"> <i class="bi bi-umbrella-fill"></i> <strong>Rain Prob:</strong> ${day.precipitationProb}%</p>
                    <p class="mb-2 text-wrap"><strong>Weather Code:</strong> ${day.weatherCode}</p>
                `;

                const col = document.createElement('div');
                col.className = 'col-10 col-sm-6 col-md-4 col-lg-1 w-25'; // width
                col.appendChild(dayCardCol);
                weekRow.appendChild(col);
            });

            container.appendChild(weekRow);
        })
        .catch(error => console.error('Error fetching weather data:', error));
}
</script>
</body>
</html>
